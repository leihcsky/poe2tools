    <text x="24" y="150" fill="#94a3b8" font-family="ui-sans-serif, system-ui" font-size="13">New char in league</text>
    <text x="24" y="180" fill="#94a3b8" font-family="ui-sans-serif, system-ui" font-size="13">Atlas reset</text>
