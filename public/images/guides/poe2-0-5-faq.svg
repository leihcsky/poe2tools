<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="faq-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="faq-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="faq-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#faq-bg)"/>
  <rect x="72" y="72" width="1056" height="486" rx="28" fill="#0b1220" opacity="0.75" filter="url(#faq-shadow)"/>
  <rect x="96" y="96" width="1008" height="438" rx="22" fill="#0f172a" opacity="0.85"/>
  <rect x="96" y="96" width="1008" height="10" fill="url(#faq-accent)"/>

  <text x="130" y="170" fill="#fcd34d" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" font-weight="600" letter-spacing="1.5">
